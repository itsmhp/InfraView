services:
  - type: web
    name: infraview
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: infraview-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.8"

databases:
  - name: infraview-db
    plan: free
    databaseName: infraview
