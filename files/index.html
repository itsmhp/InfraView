<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRI IT Infrastructure Dashboard Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #0D9488 0%, #0F766E 100%);
            color: white;
            padding: 16px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-meta {
            font-size: 0.85em;
            opacity: 0.9;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        /* ===== SIDEBAR NAVIGATION ===== */
        .sidebar {
            width: 240px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 20px 0;
            overflow-y: auto;
            box-shadow: 2px 0 4px rgba(0, 0, 0, 0.03);
        }

        .sidebar-title {
            padding: 12px 20px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
        }

        .nav-item:hover {
            background: #f8fafc;
        }

        .nav-item.active {
            background: #ecf0ff;
            border-left-color: #0D9488;
            color: #0D9488;
            font-weight: 600;
        }

        .nav-icon {
            font-size: 1.1em;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 1.5em;
            font-weight: 700;
            color: #1e293b;
        }

        .content-meta {
            font-size: 0.9em;
            color: #64748b;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .refresh-btn {
            background: #0D9488;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: #0F766E;
            transform: translateY(-1px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        /* ===== IFRAME CONTAINER ===== */
        .dashboard-container {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #dashboard-iframe {
            border: none;
            flex: 1;
            width: 100%;
            height: 100%;
            min-height: 600px;
        }

        /* ===== LOADING STATE ===== */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            border-radius: 12px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #0D9488;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .header-title {
                font-size: 1.1em;
            }

            .main-content {
                padding: 16px;
            }

            .content-title {
                font-size: 1.2em;
            }

            .content-meta {
                font-size: 0.8em;
            }
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                padding: 12px 0;
                max-height: 120px;
                overflow-x: auto;
                overflow-y: hidden;
                display: flex;
                align-items: center;
            }

            .sidebar-title {
                display: none;
            }

            .nav-item {
                white-space: nowrap;
                padding: 10px 16px;
            }

            .main-content {
                padding: 12px;
            }

            .content-title {
                font-size: 1em;
            }
        }

        /* ===== FOOTER INFO ===== */
        .footer-info {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 0.8em;
            color: #64748b;
            border-left: 3px solid #0D9488;
        }

        .footer-info strong {
            color: #0D9488;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div>
            <div class="header-title">📊 BRI IT Infrastructure Dashboards</div>
            <div class="header-meta">Bank Rakyat Indonesia • PMO Infrastruktur</div>
        </div>
        <div class="header-meta" id="current-time"></div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-title">Dashboard</div>
            
            <div class="nav-item active" data-dashboard="cje0" data-title="CJE0 Budget Monitoring">
                <span class="nav-icon">💰</span>
                <span>Budget (CJE0)</span>
            </div>
            
            <div class="nav-item" data-dashboard="pengadaan" data-title="Status Pengadaan">
                <span class="nav-icon">📦</span>
                <span>Pengadaan</span>
            </div>
            
            <div class="nav-item" data-dashboard="inf" data-title="Infrastructure Dashboard">
                <span class="nav-icon">🏗️</span>
                <span>Infrastructure</span>
            </div>

            <div class="footer-info">
                <strong>💡 Tip:</strong> Klik dashboard untuk switch view
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="content-header">
                <div>
                    <div class="content-title" id="dashboard-title">CJE0 Budget Monitoring</div>
                    <div class="content-meta">
                        <span id="last-updated">Last updated: --:--</span>
                        <button class="refresh-btn" id="refresh-btn" title="Refresh dashboard (F5)">
                            ↻ Refresh
                        </button>
                    </div>
                </div>
            </div>

            <!-- DASHBOARD CONTAINER WITH IFRAME -->
            <div class="dashboard-container" style="position: relative;">
                <iframe 
                    id="dashboard-iframe" 
                    src="dashboards/cje0.html"
                    title="Dashboard"
                    loading="lazy"
                    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-presentation"
                >
                </iframe>
                <div class="loading-overlay" id="loading-overlay">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== DASHBOARD CONFIGURATION =====
        const dashboards = {
            cje0: {
                path: 'dashboards/cje0.html',
                title: 'CJE0 Budget Monitoring',
                description: 'SAP CJE0 Real-time Budget Tracking'
            },
            pengadaan: {
                path: 'dashboards/pengadaan.html',
                title: 'Status Pengadaan',
                description: 'Monitoring Status Pengadaan Infrastruktur'
            },
            inf: {
                path: 'dashboards/inf.html',
                title: 'Infrastructure Dashboard',
                description: 'IT Infrastructure Overview'
            }
        };

        // ===== DOM ELEMENTS =====
        const iframeEl = document.getElementById('dashboard-iframe');
        const loadingOverlay = document.getElementById('loading-overlay');
        const dashboardTitle = document.getElementById('dashboard-title');
        const lastUpdated = document.getElementById('last-updated');
        const refreshBtn = document.getElementById('refresh-btn');
        const currentTimeEl = document.getElementById('current-time');
        const navItems = document.querySelectorAll('.nav-item');

        // ===== UTILITY: Update Time Display =====
        function updateTime() {
            const now = new Date();
            currentTimeEl.textContent = now.toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            lastUpdated.textContent = `Last updated: ${now.toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit'
            })}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // ===== LOAD DASHBOARD =====
        function loadDashboard(dashboardKey) {
            if (!dashboards[dashboardKey]) return;

            const dashboard = dashboards[dashboardKey];

            // Show loading
            loadingOverlay.classList.add('active');

            // Update title
            dashboardTitle.textContent = dashboard.title;

            // Update active nav item
            navItems.forEach(item => {
                item.classList.remove('active');
                if (item.dataset.dashboard === dashboardKey) {
                    item.classList.add('active');
                }
            });

            // Load iframe
            iframeEl.src = dashboard.path;

            // Hide loading after iframe loads (or after 3 seconds timeout)
            const loadTimeout = setTimeout(() => {
                loadingOverlay.classList.remove('active');
            }, 3000);

            iframeEl.onload = () => {
                clearTimeout(loadTimeout);
                loadingOverlay.classList.remove('active');
                updateTime();
            };

            // Save to localStorage for persistence
            localStorage.setItem('lastDashboard', dashboardKey);
        }

        // ===== NAV ITEM CLICK HANDLER =====
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                loadDashboard(item.dataset.dashboard);
            });
        });

        // ===== REFRESH BUTTON =====
        refreshBtn.addEventListener('click', () => {
            iframeEl.src = iframeEl.src;
            updateTime();
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + R = Refresh
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
                e.preventDefault();
                refreshBtn.click();
            }
            // Ctrl/Cmd + 1,2,3 = Switch dashboard
            if (e.ctrlKey || e.metaKey) {
                if (e.key === '1') loadDashboard('cje0');
                if (e.key === '2') loadDashboard('pengadaan');
                if (e.key === '3') loadDashboard('inf');
            }
        });

        // ===== RESTORE LAST DASHBOARD ON PAGE LOAD =====
        window.addEventListener('load', () => {
            const lastDashboard = localStorage.getItem('lastDashboard') || 'cje0';
            loadDashboard(lastDashboard);
        });

        // ===== PREVENT IFRAME SANDBOX ISSUES =====
        window.addEventListener('error', (e) => {
            console.warn('Dashboard load error:', e.message);
            // Don't break the page - just warn
        });
    </script>
</body>
</html>
