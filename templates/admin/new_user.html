{% extends "base.html" %}
{% block title %}Tambah User — InfraView{% endblock %}

{% block content %}
<div class="p-6 lg:p-8 max-w-lg">
    <div class="mb-6">
        <a href="{{ url_for('admin.users') }}" class="text-sm text-slate-400 hover:text-bri-600 transition">&larr; Kembali ke User</a>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="px-6 py-4 border-b border-slate-100">
            <h2 class="font-semibold text-slate-800">Tambah User Baru</h2>
        </div>
        <form method="POST" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Username *</label>
                <input type="text" name="username" required placeholder="e.g. hanif"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Nama Tampilan</label>
                <input type="text" name="display_name" placeholder="e.g. Hanif"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Password *</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Role</label>
                <select name="role" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm">
                    <option value="viewer">Viewer</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-bri-500 hover:bg-bri-600 text-white font-medium py-2.5 rounded-lg transition">
                Tambah User
            </button>
        </form>
    </div>
</div>
{% endblock %}
