{% extends "base.html" %}
{% block title %}Edit {{ dashboard.name }} — InfraView{% endblock %}

{% block content %}
<div class="p-6 lg:p-8 max-w-lg">
    <div class="mb-6">
        <a href="{{ url_for('admin.panel') }}" class="text-sm text-slate-400 hover:text-bri-600 transition">&larr; Kembali ke Admin</a>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="px-6 py-4 border-b border-slate-100">
            <h2 class="font-semibold text-slate-800">Edit — {{ dashboard.icon }} {{ dashboard.name }}</h2>
        </div>
        <form method="POST" class="p-6 space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Nama Dashboard</label>
                <input type="text" name="name" required value="{{ dashboard.name }}"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Slug <span class="text-xs text-slate-400">(tidak bisa diubah)</span></label>
                <input type="text" value="{{ dashboard.slug }}" disabled
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg bg-slate-50 text-slate-400 text-sm font-mono">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Deskripsi</label>
                <textarea name="description" rows="2"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm">{{ dashboard.description }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Icon (Emoji)</label>
                    <input type="text" name="icon" value="{{ dashboard.icon }}" maxlength="4"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm text-center text-xl">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Urutan</label>
                    <input type="number" name="sort_order" value="{{ dashboard.sort_order }}" min="0"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-bri-500 focus:border-bri-500 outline-none text-sm">
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" name="is_active" id="is_active" {{ 'checked' if dashboard.is_active }}
                    class="w-4 h-4 text-bri-600 rounded border-slate-300 focus:ring-bri-500">
                <label for="is_active" class="text-sm text-slate-600">Aktif (tampil di hub)</label>
            </div>
            <button type="submit" class="w-full bg-bri-500 hover:bg-bri-600 text-white font-medium py-2.5 rounded-lg transition">
                Simpan Perubahan
            </button>
        </form>

        <!-- Delete -->
        <div class="px-6 pb-6">
            <div class="border-t border-slate-100 pt-4">
                <form method="POST" action="{{ url_for('admin.delete_dashboard', id=dashboard.id) }}"
                      onsubmit="return confirm('Hapus dashboard {{ dashboard.name }}? Data HTML juga akan dihapus.')">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="text-xs text-red-500 hover:text-red-700 transition">
                        Hapus Dashboard
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
