{% extends "base.html" %}
{% block title %}Tambah Dashboard — InfraView{% endblock %}

{% block content %}
<div class="p-6 lg:p-8 max-w-lg">
    <div class="mb-6">
        <a href="{{ url_for('admin.panel') }}" class="text-sm text-slate-400 hover:text-teal-600 transition">&larr; Kembali ke Admin</a>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="px-6 py-4 border-b border-slate-100">
            <h2 class="font-semibold text-slate-800">Tambah Dashboard Baru</h2>
        </div>
        <form method="POST" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Nama Dashboard *</label>
                <input type="text" name="name" required placeholder="e.g. CJE0 Budget Monitoring"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Slug * <span class="text-xs text-slate-400">(untuk URL, huruf kecil, tanpa spasi)</span></label>
                <input type="text" name="slug" required placeholder="e.g. cje0" pattern="[a-z0-9\-]+"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none text-sm font-mono">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Deskripsi</label>
                <textarea name="description" rows="2" placeholder="Deskripsi singkat dashboard"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none text-sm"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Icon (Emoji)</label>
                    <input type="text" name="icon" value="📊" maxlength="4"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none text-sm text-center text-xl">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Urutan</label>
                    <input type="number" name="sort_order" value="0" min="0"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none text-sm">
                </div>
            </div>
            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2.5 rounded-lg transition">
                Tambah Dashboard
            </button>
        </form>
    </div>
</div>
{% endblock %}
